    border-bottom: 1px solid #e0dfd8;
    display: flex; align-items: center; gap: 10px;
  }
  #name-bar label { font-size: 12px; color: #666; white-space: nowrap; }
  #name-input {
    font-size: 12px; padding: 5px 10px; border-radius: 8px;
    border: 1px solid #ddd; background: #fafaf8; color: #222;

  .online-bar {
    padding: 0.4rem 1.5rem;

    border-bottom: 1px solid #f0efea;
    display: flex; align-items: center; gap: 6px;
  }
  .online-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .tabs-wrap {
    display: flex; overflow-x: auto;
    border-bottom: 1px solid #e0dfd8;
    scrollbar-width: none; background: #fafaf8;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 0.65rem 1.2rem;
    font-size: 13px; font-weight: 500; color: #888;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap; display: flex; align-items: center; gap: 7px;
    user-select: none;
  }
  .tab:hover { color: #333; }
  .tab.active { color: #111; border-bottom-color: #BA7517; }
  .tab-pill {
    font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 20px;
    background: #e8e8e2; color: #666;
    min-width: 20px; text-align: center;
  }
  .tab.active .tab-pill { background: #FAEEDA; color: #633806; }

  .progress-wrap { height: 4px; background: #f0efea; }
  .progress-fill { height: 4px; background: #BA7517; transition: width 0.35s ease; width: 0%; }

  .summary-bar {
    display: flex; gap: 1rem;
    padding: 0.65rem 1.5rem;
    border-bottom: 1px solid #f0efea; flex-wrap: wrap;
  }
  .sum-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .dot-nok     { background: #D85A30; }
  .dot-review  { background: #BA7517; }
  .dot-pending { background: #ccc; }

  .panel { display: none; }
  .panel.active { display: block; }

  .item {
    padding: 0.85rem 1.5rem;

    display: flex; align-items: flex-start; gap: 12px;

  .shot-input { font-size: 12px; }
  .shot-preview { display: none; max-width: 220px; max-height: 140px; border-radius: 10px; border: 1px solid #ddd; background: #fafaf8; }
  .shot-preview.show { display: block; }
  .shot-link, .shot-remove {
    font-size: 11px; text-decoration: none; padding: 5px 8px; border-radius: 8px; border: 1px solid #ddd;
    background: #fafaf8; color: #633806; cursor: pointer;
  }
  .shot-remove { color: #712B13; }

    font-size: 12px; padding: 4px 9px;

    background: #fafaf8; color: #222;

    area.items.forEach(item => {
      document.getElementById(`sel-${area.key}-${item.id}`).addEventListener("change", () => writeItem(area.key, item.id));
      document.getElementById(`cmt-${area.key}-${item.id}`).addEventListener("change",  () => writeItem(area.key, item.id));
      document.getElementById(`img-${area.key}-${item.id}`).addEventListener("change",  () => writeItem(area.key, item.id, { uploadScreenshot: true }));
      document.getElementById(`rm-${area.key}-${item.id}`).addEventListener("click",   () => removeScreenshot(area.key, item.id));
    });
  });

  // ─── TAB SWITCH ───────────────────────────────────────────────────
  function switchTab(key) {
    activeKey = key;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.key === key));
    document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + key));
    updateSummary();
  }

  // ─── FIREBASE WRITE ───────────────────────────────────────────────
  const nameInput = document.getElementById("name-input");
  nameInput.value = localStorage.getItem("checklist_name") || "";
  nameInput.addEventListener("input", () => localStorage.setItem("checklist_name", nameInput.value));

  let saveTimer;
  function flashSaved() {
    const el = document.getElementById("saved-indicator");
    el.classList.add("show");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => el.classList.remove("show"), 2000);
  }

  async function fileToCompressedDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const maxWidth = 1280;
          const scale = Math.min(1, maxWidth / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function updateScreenshotUi(areaKey, itemId, screenshot) {
    const previewEl = document.getElementById(`prv-${areaKey}-${itemId}`);
    const linkEl = document.getElementById(`lnk-${areaKey}-${itemId}`);
    const removeEl = document.getElementById(`rm-${areaKey}-${itemId}`);

    if (screenshot) {
      previewEl.src = screenshot;
      previewEl.classList.add('show');
      linkEl.href = screenshot;
      linkEl.style.display = '';
      removeEl.style.display = '';
    } else {
      previewEl.src = '';
      previewEl.classList.remove('show');
      linkEl.removeAttribute('href');
      linkEl.style.display = 'none';
      removeEl.style.display = 'none';
    }
  }

  async function writeItem(areaKey, itemId, options = {}) {
    const selEl = document.getElementById(`sel-${areaKey}-${itemId}`);
    const cmtEl = document.getElementById(`cmt-${areaKey}-${itemId}`);
    const imgEl = document.getElementById(`img-${areaKey}-${itemId}`);
    const user  = nameInput.value.trim() || "Anónimo";
    const previous = (fbData[areaKey] && fbData[areaKey][itemId]) || {};

    let screenshot = previous.screenshot || '';
    if (options.uploadScreenshot && imgEl.files && imgEl.files[0]) {
      screenshot = await fileToCompressedDataUrl(imgEl.files[0]);
      imgEl.value = '';
    }

    await set(ref(db, `${FB_NODE}/${areaKey}/${itemId}`), {
      status: selEl.value,
      comment: cmtEl.value,
      screenshot,
      user,
      ts: Date.now()
    });

    updateScreenshotUi(areaKey, itemId, screenshot);
    flashSaved();
  }

  async function removeScreenshot(areaKey, itemId) {
    const previous = (fbData[areaKey] && fbData[areaKey][itemId]) || {};
    const selEl = document.getElementById(`sel-${areaKey}-${itemId}`);
    const cmtEl = document.getElementById(`cmt-${areaKey}-${itemId}`);
    const imgEl = document.getElementById(`img-${areaKey}-${itemId}`);
    const user  = nameInput.value.trim() || "Anónimo";

    await set(ref(db, `${FB_NODE}/${areaKey}/${itemId}`), {
      status: selEl.value,
      comment: cmtEl.value,
      screenshot: '',
      user,
      ts: Date.now()
    });

    imgEl.value = '';
    updateScreenshotUi(areaKey, itemId, '');
    flashSaved();
  }

  // ─── SUMMARY ──────────────────────────────────────────────────────
  function updateSummary() {
    const area = AREAS.find(a => a.key === activeKey);
    let ok=0, nok=0, review=0, pending=0;
    area.items.forEach(item => {
      const d = fbData[activeKey] && fbData[activeKey][item.id];
      const s = d ? d.status : "pending";
      if      (s === "ok")     ok++;
      else if (s === "nok")    nok++;
      else if (s === "review") review++;
      else                     pending++;
    });
    const done  = ok + nok + review;
    const total = area.items.length;
    document.getElementById("progress-bar").style.width = Math.round((done / total) * 100) + "%";
    document.getElementById("cnt-ok").textContent      = ok      + " OK";
    document.getElementById("cnt-nok").textContent     = nok     + " NOK";
    document.getElementById("cnt-review").textContent  = review  + " En revisión";
    document.getElementById("cnt-pending").textContent = pending + " Pendiente";

    let gDone=0, gTotal=0;
    AREAS.forEach(a => {
      gTotal += a.items.length;
      a.items.forEach(item => {
        const d = fbData[a.key] && fbData[a.key][item.id];
        if (d && d.status !== "pending") gDone++;
      });
    });
    document.getElementById("global-sub").textContent =
      `${gDone} de ${gTotal} puntos completados en total`;
  }

  function updatePills() {
    AREAS.forEach(area => {
      let done = 0;
      area.items.forEach(item => {
        const d = fbData[area.key] && fbData[area.key][item.id];
        if (d && d.status !== "pending") done++;
      });
      const pill = document.getElementById(`pill-${area.key}`);
      if (pill) pill.textContent = `${done}/${area.items.length}`;
    });
  }

  // ─── REALTIME LISTENER ────────────────────────────────────────────
  onValue(ref(db, FB_NODE), (snapshot) => {
    document.getElementById("online-text").textContent = "Sincronizado en tiempo real";
    fbData = snapshot.val() || {};

    AREAS.forEach(area => {
      area.items.forEach(item => {
        const selEl = document.getElementById(`sel-${area.key}-${item.id}`);
        const cmtEl = document.getElementById(`cmt-${area.key}-${item.id}`);
        const d = fbData[area.key] && fbData[area.key][item.id];
        if (d) {
          if (document.activeElement !== selEl) {
            selEl.value = d.status || "pending";
            selEl.className = "status-select " + (d.status || "pending");
          }
          if (document.activeElement !== cmtEl) {
            cmtEl.value = d.comment || "";
          }
          updateScreenshotUi(area.key, item.id, d.screenshot || '');
        } else {
          updateScreenshotUi(area.key, item.id, '');
        }
      });
    });

    updatePills();
    updateSummary();
  }, (err) => {
    document.getElementById("online-text").textContent = "Error de conexión — " + err.message;
  });
</script>
</body>
</html>
